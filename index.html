<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaySmart — Management & Real Estate Solutions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: radial-gradient(circle at 50% 30%, #102a45 0%, #050c14 70%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(rgba(0,242,254,0.05) 2px, transparent 4px), radial-gradient(rgba(255,255,255,0.02) 1px, transparent 3px);
            background-size: 80px 80px, 40px 40px;
            background-position: 0 0, 20px 20px;
            z-index: 0;
            pointer-events: none;
        }

        .glow-bg {
            position: absolute; top: 15%; left: 50%;
            transform: translate(-50%,-50%);
            width: 500px; height: 250px;
            background: radial-gradient(circle, rgba(0,242,254,0.12) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            z-index: 10;
            width: 100%;
        }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #00f2fe; }

        .lang-selector { display: flex; gap: 8px; margin-left: 20px; }
        .lang-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .lang-btn.active, .lang-btn:hover {
            border-color: #00f2fe;
            color: #00f2fe;
            box-shadow: 0 0 10px rgba(0,242,254,0.2);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 5;
        }

        .brand-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
            text-align: center;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0,242,254,0.3));
        }

        .brand-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-top: 5px;
        }

        .brand-tagline {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }

        .portfolio-title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-transform: uppercase;
            text-align: center;
        }

        .portfolio-title span { color: #00f2fe; font-weight: 700; }

        .cards-container {
            display: flex;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            width: 460px;
            min-height: 320px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.165,0.84,0.44,1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(0,242,254,0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0,242,254,0.4);
            box-shadow: 0 30px 60px rgba(0,242,254,0.15);
        }

        .card-content h2 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .card-content .main-section-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .card-description {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.6;
            margin-bottom: 5px;
        }

        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .action-link {
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: color 0.3s;
        }

        .action-link:hover { color: #00f2fe; }
        .action-link::after { content: ' →'; margin-left: 8px; transition: transform 0.3s; }
        .action-link:hover::after { transform: translateX(5px); }

        .btn-see-more {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            display: block;
            cursor: pointer;
        }

        .btn-see-more:hover {
            background: rgba(0,242,254,0.1);
            border-color: #00f2fe;
            color: #00f2fe;
            box-shadow: 0 0 15px rgba(0,242,254,0.15);
        }

        .card-notice {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            line-height: 1.4;
            margin-top: 5px;
        }

        /* Sección de presentaciones */
        .presentations-section {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 60px;
            z-index: 5;
        }

        .section-title {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
        }

        .pres-cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pres-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(0,242,254,0.03) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 30px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s;
        }

        .pres-card:hover {
            border-color: rgba(0,242,254,0.3);
            box-shadow: 0 10px 30px rgba(0,242,254,0.1);
        }

        .pres-icon {
            font-size: 2.5rem;
        }

        .pres-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .pres-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.5;
        }

        .pres-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,242,254,0.1);
            border: 1px solid rgba(0,242,254,0.3);
            color: #00f2fe;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s;
            margin-top: auto;
        }

        .pres-download:hover {
            background: rgba(0,242,254,0.2);
            box-shadow: 0 0 15px rgba(0,242,254,0.2);
        }

        /* Modal para presentaciones */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #0a1b2d;
            border: 1px solid rgba(0,242,254,0.3);
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover { color: #00f2fe; }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-right: 30px;
        }

        .modal-body {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.8;
        }

        .modal-body h3 {
            color: #00f2fe;
            font-size: 1rem;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            text-transform: uppercase;
        }

        .modal-body ul {
            list-style: none;
            padding: 0;
        }

        .modal-body ul li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-left: 15px;
            position: relative;
        }

        .modal-body ul li::before {
            content: '→';
            color: #00f2fe;
            position: absolute;
            left: 0;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            z-index: 10;
        }

        @media (max-width: 980px) {
            .glass-card, .pres-card { width: 100%; }
            header { padding: 20px; flex-wrap: wrap; gap: 15px; }
            .portfolio-title { font-size: 1.5rem; }
        }
    </style>
</head>
